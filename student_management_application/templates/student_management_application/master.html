<!DOCTYPE html>
{% load bootstrap5 %}
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Student Management{% endblock %}</title>
    {% bootstrap_css %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Gestion des Étudiants</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/students/">Étudiants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/teachers/">Enseignants</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/courses/">Cours</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/scores/">Scores</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        {% block content %}
        <!-- Contenu principal ici -->
        {% endblock %}
    </div>
    <footer class="bg-light text-center text-muted mt-5 py-3">
        <p>&copy; 2023 Student Management Application</p>
    </footer>
    {% bootstrap_javascript %}
</body>
</html>
